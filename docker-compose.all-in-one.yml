  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U enowxrag"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # --- Optional: TEI embedder (uncomment when RAG_EMBEDDER=tei) ---
  # tei-embedding:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
  #   container_name: enowx-rag-tei
  #   ports:
  #     - "8081:80"
