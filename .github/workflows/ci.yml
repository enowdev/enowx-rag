name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: mcp-server/go.sum

      # The Go binary embeds web/dist via embed.FS, so a placeholder must
      # exist for `go build`/`go test` to compile without a full SPA build.
      - name: Create web/dist placeholder
        run: |
          mkdir -p web/dist
          echo '<!doctype html><title>enowx-rag</title>' > web/dist/index.html

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -count=1

  web:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build
